run = ['layout floating']


[[on-window-detected]]
if.app-id = 'com.culturedcode.ThingsMac'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.kakao.KakaoTalkMac'
run = ['layout floating', 'move-node-to-workspace R']

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = ['layout floating', 'move-node-to-workspace R']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = ['layout floating', 'move-node-to-workspace R']


[[on-window-detected]]
if.app-id = 'jp.naver.line.mac'
run = ['move-node-to-workspace R']


[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace R']

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = ['move-node-to-workspace W']

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = ['move-node-to-workspace W']

[[on-window-detected]]
if.app-id = 'com.sublimetext.3'
run = ['layout tiling', 'move-node-to-workspace W']

[[on-window-detected]]
if.app-id = 'com.sublimetext.4'
run = ['layout tiling', 'move-node-to-workspace W']

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = ['move-node-to-workspace E']

[[on-window-detected]]
if.app-id="com.mitchellh.ghostty"
run= ["layout tiling", "move-node-to-workspace Q"]
