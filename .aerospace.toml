config-version = 2

after-login-command = []
after-startup-command = [
    'exec-and-forget sketchybar --reload',
    'exec-and-forget sketchybar'
]

exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE; /opt/homebrew/bin/hs -c "AerospaceWorkspaceChanged([[$AEROSPACE_FOCUSED_WORKSPACE]])"']

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keep mouse and focused monitor aligned when switching workspaces across displays.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# on-focus-changed = 'move-mouse window-lazy-center'

automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

[workspace-to-monitor-force-assignment]
    "`" = 'DELL P2723QE'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 4
    inner.vertical =   4
    outer.left =       4
    outer.bottom =     4
    outer.top =        [{ monitor."LG HDR 4K" = 48 }, { monitor."DELL P2723QE" = 48 }, 15]
    outer.right =      4

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]
  # See: https://nikitabobko.github.io/AeroSpace/commands#layout
  alt-slash = 'layout tiles horizontal vertical'
  alt-comma = 'layout accordion horizontal vertical'

  # See: https://nikitabobko.github.io/AeroSpace/commands#focus
  alt-leftSquareBracket = 'focus left'
  alt-rightSquareBracket = 'focus right'

  # See: https://nikitabobko.github.io/AeroSpace/commands#resize
  alt-minus = 'resize smart -150'
  alt-equal = 'resize smart +150'

  # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
  alt-q = 'workspace Q'
  alt-w = 'workspace W'
  alt-e = 'workspace E'
  alt-r = 'workspace R'
  alt-backtick = 'workspace "`"'

  alt-shift-q = 'move-node-to-workspace --focus-follows-window Q'
  alt-shift-w = 'move-node-to-workspace --focus-follows-window W'
  alt-shift-e = 'move-node-to-workspace --focus-follows-window E'
  alt-shift-r = 'move-node-to-workspace --focus-follows-window R'
  alt-shift-backtick = 'move-node-to-workspace --focus-follows-window "`"'

  alt-shift-f = 'fullscreen'

  # alt-cmd-h = 'move-workspace-to-monitor left'
  # alt-cmd-l = 'move-workspace-to-monitor right'

  # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
  alt-tab = 'workspace-back-and-forth'
  # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
  alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

  # See: https://nikitabobko.github.io/AeroSpace/commands#mode
  alt-shift-semicolon = 'mode service'
  alt-shift-a = 'mode arrange'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
  esc = ['reload-config', 'mode main']
  r = ['flatten-workspace-tree', 'mode main'] # reset layout
  f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
  backspace = ['close-all-windows-but-current', 'mode main']

  # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
  #s = ['layout sticky tiling', 'mode main']

  # down = 'volume down'
  # up = 'volume up'
  # shift-down = ['volume set 0', 'mode main']

# 'arrange' binding mode declaration: move a window within its workspace, or join it with a neighbor.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.arrange.binding]
  esc = 'mode main'

  # See: https://nikitabobko.github.io/AeroSpace/commands#move
  h = 'move left'
  j = 'move down'
  k = 'move up'
  l = 'move right'

  # See: https://nikitabobko.github.io/AeroSpace/commands#join-with
  shift-h = 'join-with left'
  shift-j = 'join-with down'
  shift-k = 'join-with up'
  shift-l = 'join-with right'

  # See: https://nikitabobko.github.io/AeroSpace/commands#focus
  ctrl-h = 'focus left'
  ctrl-j = 'focus down'
  ctrl-k = 'focus up'
  ctrl-l = 'focus right'

[[on-window-detected]]
if.app-id = 'com.runningwithcrayons.Alfred-Preferences'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.hegenberg.BetterTouchTool'
run = ['layout floating']

[[on-window-detected]]
