# Starship Configuration
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$directory$git_branch$character
"""
# Palette
palette = "gruvbox_material_dark_medium"

[palettes.gruvbox_material_dark_medium]
background = "#282828"     # Base00
black = "#32302f"          # Base01
bright-black = "#45403d"   # Base02
grey = "#5a524c"           # Base03
light-grey = "#7c6f64"     # Base04
foreground = "#d4be98"     # Base05
white = "#ddc7a1"          # Base06
bright-white = "#ebdbb2"   # Extra foreground
red = "#ea6962"            # Base08
orange = "#e78a4e"         # Base09
yellow = "#d8a657"         # Base0A
green = "#a9b665"          # Base0B
cyan = "#89b482"           # Base0C
blue = "#7daea3"           # Base0D
magenta = "#d3869b"        # Base0E
pink = "#d3869b"           # Accent duplicate for compatibility
darker-black = "#1b1b1b"   # Base10 (bg_dim)
darkest-black = "#141617"  # Extra deep background
bright-red = "#ea6962"     # Base12
bright-yellow = "#d8a657"  # Base13
bright-green = "#a9b665"   # Base14
bright-cyan = "#89b482"    # Base15
bright-blue = "#7daea3"    # Base16
bright-purple = "#d3869b"  # Base17

[os]
disabled = true

[directory]
truncation_length = 1
truncate_to_repo = false
style = "fg:blue bg:background"
read_only_style = "bright-yellow"
truncation_symbol = ""
repo_root_style = "underline fg:blue bg:background"

[git_branch]
format = "[\\[](fg:yellow bg:background)[$branch](fg:bright-yellow bg:background)[\\]](fg:yellow bg:background)"
truncation_length = 50

# Enhanced Git Status without clean indicator
[git_status]
format = "[$all_status$ahead_behind](fg:foreground bg:background)"
staged      = "●"   # 스테이징됨
modified    = "±"   # 수정됨 (plus-minus: 변경 느낌)
deleted     = "−"   # 삭제됨 (minus 기호로 통일)
renamed     = "→"   # 이름 변경됨
untracked   = "… "  # 추적되지 않음 (생략점 그대로 유지)
conflicted  = "≠"   # 충돌
ahead       = "↑"   # 로컬이 앞섬
behind      = "↓"   # 로컬이 뒤처짐
diverged    = "↕"   # 서로 갈라짐

[package]
disabled = true

[time]
disabled = false
format="[$time](fg:bright-yellow bg:background)"
time_format="%a %Y.%m.%d %H:%M:%S %Z (%s)"

[cmd_duration]
format = "[$duration](fg:foreground bg:background)"

[fill]
symbol = "-"

[character]
format = "$symbol "
error_symbol = "[✗](bold red)"


# Docker Module with Underlined Context Only
[docker_context]
format = "[  ](bg:background)[$context](underline fg:bright-blue bg:background)"
disabled = false

# Kubernetes Module with Underlined Context Only
[kubernetes]
format = "[  ](background)[$context](underline fg:bright-cyan bg:background)"
disabled = false

# Language Modules with Underlined Versions Only
[nodejs]
format = "[  node: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[python]
format = "[  python: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[rust]
format = "[  rust: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[java]
format = "[  java: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[swift]
format = "[  swift: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[dart]
format = "[  dart: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[ruby]
format = "[  ruby: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[scala]
format = "[  scala: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false

[kotlin]
format = "[  kotlin: ](fg:bright-purple bg:background)[$version](fg:bright-purple bg:background underline)"
disabled = false
