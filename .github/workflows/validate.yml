name: Validate Dotfiles

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: brew install fish lua neovim ripgrep stow
      - name: Validate configuration
        env:
          RUN_NVIM_INTEGRATION: "1"
        run: bash tests/validate.sh
